<style>
/* ===== 令牌 —— 页面透明露 App 壁纸(22.1)，面板走中性半透明变量(22.2)，
   accent 暖金：影院放映灯落在冷灰机身上的光，克制使用 ===== */
:root {
  --panel-rgb: 24, 24, 38;
  --panel: rgba(var(--panel-rgb), .60);
  --panel-soft: rgba(var(--panel-rgb), .44);
  --panel-strong: rgba(var(--panel-rgb), .86);
  --line: rgba(255, 255, 255, .12);
  --line-strong: rgba(255, 255, 255, .28);
  --ink: #f4f3fa;
  --ink-dim: rgba(244, 243, 250, .62);
  --ink-faint: rgba(244, 243, 250, .38);
  --accent: #7c47f0;
  --accent-2: #4b7bff;
  --accent-ink: #ffffff;
  --grad: linear-gradient(135deg, #c13aee 0%, #7b3ff2 55%, #4b7bff 100%);
  --accent-soft: rgba(124, 71, 240, .18);
  --accent-line: rgba(124, 71, 240, .55);
  --sheet-bg: #0b0a12;
  --ok: #57c98a; --bad: #e5654f; --lock: #e0b23c; --gray: #8a95a0;
  --radius: 12px;
  --safe-top: 12px; --safe-bottom: 12px; --safe-left: 0px; --safe-right: 0px;
}
.no-css-functions:root { --safe-top: 24px; --safe-bottom: 24px; }
:root {
  --safe-top: max(var(--fm-safe-top, 12px), env(safe-area-inset-top, 12px));
  --safe-bottom: max(var(--fm-safe-bottom, 12px), env(safe-area-inset-bottom, 12px));
  --safe-left: max(var(--fm-safe-left, 0px), env(safe-area-inset-left, 0px));
  --safe-right: max(var(--fm-safe-right, 0px), env(safe-area-inset-right, 0px));
  /* 只在全屏/融合 chrome（edge/immersive）下才需要页面自己避让状态栏；
     normal/tv-normal 原生已显示顶部工具栏时清零，避免和原生顶部区域叠加出现空白 */
  --fm-ext-safe-top: var(--safe-top);
}
html.fm-chrome-normal { --fm-ext-safe-top: 0px; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; min-height: 100%; background: transparent; color: var(--ink);
  font-family: "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", "Noto Sans CJK SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased;
}
html:not(.fm-native), html:not(.fm-native) body {
  background: radial-gradient(1200px 600px at 72% -10%, #241d44 0%, #14121f 60%, #0b0a12 100%);
}
.mono { font-family: ui-monospace, "SF Mono", "Roboto Mono", "DejaVu Sans Mono", Consolas, monospace; letter-spacing: .04em; }
.app { min-height: 100vh; min-height: var(--fm-web-height, 100vh); background: transparent; padding-left: var(--safe-left); padding-right: var(--safe-right); }
button { font: inherit; color: inherit; cursor: pointer; border: 0; background: none; -webkit-appearance: none; appearance: none; outline: none; }
input { font: inherit; color: inherit; }
img { display: block; border: 0; }

.focusable:focus, .focusable.focus { outline: none; }
.tv-mode .focusable:focus, .tv-mode .focusable.focus { box-shadow: 0 0 0 2px var(--accent) inset; background-color: var(--accent-soft); }

/* 头部 */
.header { position: sticky; top: 0; z-index: 30; padding-top: calc(var(--fm-ext-safe-top) + 8px); padding-bottom: 8px;
  background: linear-gradient(180deg, rgba(16,21,27,.95) 0%, rgba(16,21,27,.86) 60%, rgba(16,21,27,.55) 100%);
  -webkit-backdrop-filter: blur(16px) saturate(1.3); backdrop-filter: blur(16px) saturate(1.3); }
.fm-native .header { background: linear-gradient(180deg, rgba(16,21,27,.9) 0%, rgba(16,21,27,.8) 60%, rgba(16,21,27,.48) 100%); }
.no-css-functions .header { -webkit-backdrop-filter: none; backdrop-filter: none; background: rgba(16,21,27,.92); }
.header-row { display: flex; align-items: center; padding: 0 16px; }
.brand { display: flex; align-items: center; white-space: nowrap; }
.brand-mark-btn { flex: 0 0 auto; display: block; padding: 0; line-height: 0; }
.brand-mark { display: block; }
.fz-sq, .fz-tri { transform-box: fill-box; transform-origin: center; }
.fz-sq { animation: fzPulse 2.4s ease-in-out infinite; }
.fz-sq1 { animation-delay: 0s; }
.fz-sq2 { animation-delay: .2s; }
.fz-sq3 { animation-delay: .4s; }
.fz-tri { animation: fzPlay 1.6s ease-in-out infinite; }
@keyframes fzPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(.86); } }
@keyframes fzPlay { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.12); opacity: .7; } }
@media (prefers-reduced-motion: reduce) { .fz-sq, .fz-tri { animation: none; } }
.brand-mark-btn:active { transform: scale(.9); }
.tv-mode .brand-mark-btn.focus, .tv-mode .brand-mark-btn:focus { box-shadow: 0 0 0 2px var(--accent); border-radius: 8px; }
.brand .name { font-size: 18px; font-weight: 900; margin-left: 9px; letter-spacing: -.01em; text-transform: uppercase; }
.brand .tag { font-size: 10px; margin-left: 8px; padding: 2px 6px; border: 1px solid var(--line); border-radius: 6px; color: var(--ink-dim); text-transform: uppercase; }
.search-box { flex: 1 1 auto; margin: 0 12px; display: flex; align-items: center; background: var(--panel); box-shadow: 0 0 0 1px var(--line) inset; border-radius: 999px; padding: 0 6px 0 14px; min-width: 0; position: relative; transition: box-shadow .15s ease, background .15s ease; }
.search-box .ico { color: var(--ink-faint); margin-right: 8px; flex: 0 0 auto; display: block; }
.search-input { flex: 1 1 auto; min-width: 0; background: transparent; border: 0; outline: none; padding: 9px 0; color: var(--ink); font-size: 15px; }
.search-input::placeholder { color: var(--ink-faint); }
.search-box:focus-within { box-shadow: 0 0 0 1.5px var(--accent) inset; background: rgba(255,255,255,.03); }
.search-box:focus-within .ico { color: var(--accent); }
.search-go { flex: 0 0 auto; padding: 6px 14px; border-radius: 999px; background: var(--grad); color: #fff; font-weight: 700; font-size: 13px; }
.search-suggest { position: absolute; left: 0; right: 0; top: calc(100% + 8px); z-index: 40; background: var(--panel-strong); border: 1px solid var(--line); border-radius: 14px; overflow-y: auto; max-height: 360px; display: none; box-shadow: 0 16px 40px rgba(0,0,0,.45);
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); }
.no-css-functions .search-suggest { -webkit-backdrop-filter: none; backdrop-filter: none; background: rgba(24,24,38,.94); }
.search-suggest.active { display: block; }
.sg-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; }
.sg-item:active, .sg-item.hl { background: var(--panel-soft); }
.sg-thumb { flex: 0 0 auto; width: 34px; height: 48px; border-radius: 6px; overflow: hidden; background: rgba(255,255,255,.06); }
.sg-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sg-text { min-width: 0; flex: 1 1 auto; }
.sg-title { font-size: 13px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sg-meta { font-size: 11px; color: var(--ink-faint); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sg-empty { padding: 14px; font-size: 12px; color: var(--ink-faint); text-align: center; }
.chips { display: flex; overflow-x: auto; white-space: nowrap; padding: 10px 16px 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip { flex: 0 0 auto; margin-right: 8px; padding: 7px 15px; border-radius: 999px; font-size: 13px; background: var(--panel-soft); box-shadow: 0 0 0 1px var(--line) inset; color: var(--ink-dim); }
.chip:last-child { margin-right: 0; }
.chip.active { background: var(--grad); color: #fff; box-shadow: none; font-weight: 700;
  -webkit-mask-image: -webkit-radial-gradient(white, black);
  transform: translateZ(0); -webkit-transform: translateZ(0);
  backface-visibility: hidden; -webkit-backface-visibility: hidden; }

/* 区块 */
.section { padding: 14px 12px 0; }
.section-head { display: flex; align-items: center; margin-bottom: 10px; }
.section-title { font-size: 17px; font-weight: 800; letter-spacing: -.01em; flex: 0 0 auto; }
.section-sub { font-size: 10.5px; color: var(--ink-faint); margin-left: 8px; letter-spacing: .06em; text-transform: uppercase; flex: 0 0 auto; display: none; }
.section-line { flex: 0 0 auto; width: 20px; height: 1px; background: rgba(255,255,255,.1); margin: 0 10px; }
.clear-search { margin-left: auto; padding: 5px 11px 5px 9px; background: var(--panel-soft); border: 1px solid var(--line); border-radius: 999px; font-size: 12px; color: var(--ink-faint); flex: 0 0 auto; display: flex; align-items: center; gap: 4px; }
.clear-search svg { flex: 0 0 auto; }
.clear-search:active { color: var(--ink-dim); background: var(--accent-soft); border-color: var(--accent-line); transform: scale(.96); }
.genre-chips { display: flex; flex: 1 1 auto; min-width: 0; overflow-x: auto; white-space: nowrap; gap: 6px; margin-left: 10px; padding: 2px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.genre-chips::-webkit-scrollbar { display: none; }
.genre-chips:empty { display: none; margin: 0; }
.genre-chip { flex: 0 0 auto; padding: 3px 10px; border-radius: 999px; font-size: 11px; line-height: 1.7; background: transparent; box-shadow: 0 0 0 1px var(--line) inset; color: var(--ink-faint); }
.genre-chip.active { background: var(--accent-soft); color: var(--ink); box-shadow: 0 0 0 1px var(--accent-line) inset; font-weight: 600; }

.rail { display: flex; overflow-x: auto; white-space: nowrap; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.rail::-webkit-scrollbar { display: none; }
.rail .card { flex: 0 0 auto; width: 116px; margin-right: 12px; white-space: normal; }

.grid { display: flex; flex-wrap: wrap; margin: 0 -3px; }
.grid .card { flex: 0 0 auto; width: calc(33.333% - 6px); max-width: calc(33.333% - 6px); min-width: 0; margin: 0 3px 10px; box-sizing: border-box; }

.poster { position: relative; width: 100%; padding-top: 150%; border-radius: var(--radius); overflow: hidden; background: linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02)); border: 1px solid var(--line); }
.poster img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
.poster .ph { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--ink-faint); font-size: 26px; font-weight: 800; text-align: center; padding: 8px; }
.badge { position: absolute; top: 7px; left: 7px; padding: 3px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 800; letter-spacing: .07em;
  box-shadow: 0 3px 10px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.14) inset; }
.badge.q-4k { color: #2a1c02; background: linear-gradient(135deg, #ffe9a8 0%, #f0b94a 45%, #c8842a 100%); text-shadow: 0 1px 0 rgba(255,255,255,.35); }
.badge.q-1080 { color: #fff; background: var(--grad); text-shadow: 0 1px 2px rgba(0,0,0,.35); }
.badge.q-hd { color: var(--ink); background: rgba(20,20,32,.74); border: 1px solid rgba(255,255,255,.16); }
.card-title { margin-top: 5px; font-size: 12.5px; line-height: 1.3; height: 2.6em; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
.card-meta { display: none; }
.card { transition: transform .12s ease; }
.card:active { transform: scale(.96); }
.tv-mode .card.focus .poster { box-shadow: 0 0 0 3px var(--accent); }
.tv-mode .card.focus { transform: translateY(-2px) scale(1.02); }

.notice { margin: 12px 16px; padding: 16px; background: var(--panel-soft); border: 1px solid var(--line); border-radius: var(--radius); }
.notice h4 { margin: 0 0 6px; font-size: 14px; }
.notice p { margin: 0 0 10px; font-size: 13px; color: var(--ink-dim); }
.notice .link { color: var(--accent); font-weight: 700; }
.loading-row { padding: 26px 16px; text-align: center; color: var(--ink-faint); font-size: 13px; }

/* 详情 / 资源浮层 —— 满幅海报英雄区（参考 HBO/Emby）
   之前的问题：.ed-hero 是滚动容器内的一个普通块，里面的 img/渐变层做了
   scale/transform，滚动时这些图层要跟着容器反复合成重绘，iOS/Android
   WebView 在裁剪边缘处经常半像素错位，露出图层下方默认背景，表现为
   （大播放按钮所在的）海报底部边界处一条白线闪烁几下才消失。
   参考 nf.html 详情页的做法：把海报图和渐变遮罩改成 position:fixed，
   固定挂在视口上、完全不参与 .sheet 的滚动；滚动时只有 .ed-body 这层
   文字内容在移动，海报图层本身自始至终没有任何几何变化（只在滚动时
   用 filter 做压暗，不再 transform/裁剪），因此不会再出现合成边缘错位。 */
.sheet { position: fixed; top: 0; right: 0; bottom: 0; left: 0; inset: 0; z-index: 60; display: none; background: transparent; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; }
.sheet.active { display: block; }
body.detail-active .app { visibility: hidden; pointer-events: none; }
body.detail-active { background: var(--sheet-bg); }

.ed-hero { position: fixed; inset: 0; z-index: -2; overflow: hidden; background: #05050a; }
.ed-hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 18%;
  transform: scale(1.06); transition: filter .2s linear, opacity .35s ease;
  animation: heroIn 1.1s cubic-bezier(.2,.7,.2,1) forwards, heroBreathe 11s ease-in-out 1.1s infinite; }
#edHeroImgHD { opacity: 0; }
#edHeroImgHD.loaded { opacity: 1; }
@keyframes heroIn { from { transform: scale(1.14); opacity: 0; } to { transform: scale(1.06); opacity: 1; } }
/* 海报缓慢的“呼吸”式微缩放，营造画面在动的感觉；只改 transform 的 scale 值，
   不涉及尺寸/裁剪范围变化，不会引入新的合成边缘问题 */
@keyframes heroBreathe { 0%, 100% { transform: scale(1.06); } 50% { transform: scale(1.12); } }
@media (prefers-reduced-motion: reduce) {
  .ed-hero img { animation: heroIn 1.1s cubic-bezier(.2,.7,.2,1) forwards; }
}
.ed-hero.contain img { object-fit: contain; object-position: center top; }
.ed-hero-fade { position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(120% 85% at 50% 6%, rgba(0,0,0,0) 0%, rgba(0,0,0,.14) 30%, rgba(0,0,0,.45) 45%, rgba(6,5,10,.85) 58%, var(--sheet-bg) 68%); }
/* 撑开滚动内容的占位块，高度与原来的 .ed-hero 一致，本身不带任何图像/渐变 */
.ed-hero-spacer { width: 100%; height: 68vh; min-height: 400px; }

.ed-back { position: fixed; top: calc(var(--safe-top) + 8px); left: 14px; z-index: 3;
  width: 40px; height: 40px; border-radius: 50%; font-size: 24px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  background: rgba(6,6,12,.42); color: #fff; border: 1px solid rgba(255,255,255,.14);
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }
.ed-logo { width: 100%; text-align: center; margin: -104px 0 14px; position: relative; z-index: 3; }
.ed-logo:empty { display: none; }
.ed-logo img { display: inline-block; max-width: 72%; max-height: 78px; width: auto; height: auto; filter: drop-shadow(0 3px 14px rgba(0,0,0,.7)); }

.ed-body { position: relative; z-index: 2; margin-top: -60px; padding: 0 18px calc(var(--safe-bottom) + 26px);
  display: flex; flex-direction: column; align-items: center; text-align: center; }
.ed-title { font-size: 30px; font-weight: 900; line-height: 1.14; letter-spacing: -.02em; margin-bottom: 13px; text-shadow: 0 2px 20px rgba(0,0,0,.75); }
.ed-title.hidden { display: none; }

.ed-chips { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; margin-bottom: 2px; }
.ed-chips .t { display: inline-flex; align-items: center; margin: 0 0 6px; padding: 0; border: 0; background: none;
  font-size: 12.5px; font-weight: 600; letter-spacing: .03em; color: var(--ink-dim); }
.ed-chips .t:not(:last-child)::after { content: "•"; margin: 0 6px; color: var(--ink-faint); font-size: 10px; }
.ed-chips .t.cert { color: var(--ink); font-weight: 700; padding: 2px 7px; border: 1px solid rgba(255,255,255,.32); border-radius: 3px; letter-spacing: .04em; }

.ed-play { width: 100%; max-width: 320px; margin: 3px 0 2px; padding: 11px; border-radius: 999px;
  background: #f4f3fa; color: #12101a; font-weight: 800; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  /* 圆角实心按钮在滚动时会被 WebKit 反复重新栅格化圆角裁剪路径，
     边缘抗锯齿没跟上就露出一条白线、高频闪烁。用 mask 强制走
     正确的抗锯齿路径，并单独提升成一个稳定的合成层来抑制重绘。 */
  -webkit-mask-image: -webkit-radial-gradient(white, black);
  transform: translateZ(0); -webkit-transform: translateZ(0);
  backface-visibility: hidden; -webkit-backface-visibility: hidden; }
.ed-play .tri { display: inline-flex; align-items: center; margin-right: 8px; }
.ed-play:active { transform: scale(.99) translateZ(0); }
.ed-play[disabled] { opacity: .55; }
.tv-mode .ed-play.focus, .tv-mode .ed-play:focus { box-shadow: 0 0 0 3px var(--accent), 0 0 0 6px rgba(124,71,240,.4); }

.ed-actions { display: flex; justify-content: center; align-items: center; gap: 42px; margin: 7px 0 4px; }
.ed-ico { display: flex; align-items: center; justify-content: center; width: auto; height: auto; margin: 0; color: var(--ink-dim);
  transition: transform .12s ease, color .15s ease; }
.ed-ico svg { width: 20px; height: 20px; display: block; }
.ed-ico:active { transform: scale(.88); }
.ed-ico:hover { color: var(--ink); }
.tv-mode .ed-ico.focus, .tv-mode .ed-ico:focus { color: var(--accent); }

.overview { margin: 12px 2px 2px; font-size: 14px; color: var(--ink-dim); line-height: 1.7; text-align: left; align-self: stretch; position: relative; }
.overview.clamp { display: -webkit-box; -webkit-line-clamp: 4; line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
.overview.has-more { cursor: pointer; }
.overview.has-more.expanded { cursor: pointer; }

/* 画质分组 tab（对应参考里的分季） */

    // 因为 token 已经变了会提前 return，也不会帮忙把 loading 复位）
    state.loading = false;
    $("grid").replaceChildren();
    $("browseNotice").replaceChildren();
    state.reqToken++;
  }
  if (state.loading || state.noMore) return;
  var token = state.reqToken;
  state.loading = true; state.loadingSince = Date.now();

  $("browseSub").textContent = state.source.length ? (state.source.length + " 部") : "";

  var url = state.searchMode ? searchUrl(state.searchKw, state.page) : (state.tagMode ? tagUrl(state.activeTag, state.page) : listUrl(state.activeCat, state.page));

    if (token !== state.reqToken) return;
    var items = parseList(html);

      if (!fresh.length) state.noMore = true;
      if (state.searchMode) {
        state.source = state.source.concat(fresh);
      } else {
        // 非搜索态：把"合集"卡片摘出去，做成分类 tab（和漫威合集同一套逻辑），不再混进普通列表
        var haveCol = {};

        var freshNormal = [], newCols = [];
        fresh.forEach(function (it) {

          } else {

/* 请求卡死自愈：正常请求最多 20s 超时会自己失败；这里再兜一层，

function checkStuckLoading() {
  if (!state.loading || !state.loadingSince) return;
  if (Date.now() - state.loadingSince < 25000) return;
  state.loading = false;

}
function appendGrid(auto) {
  if (state.activeCat === "__recent__") return;
  var grid = $("grid");
  var batch = state.rendered === 0 ? (state.isTv ? 18 : 12) : (state.isTv ? 12 : 9);
  var end = Math.min(state.rendered + batch, state.source.length);
  var frag = document.createDocumentFragment();
  for (var i = state.rendered; i < end; i++) frag.appendChild(mediaCard(state.source[i], i));
  grid.appendChild(frag);
  state.rendered = end;
  // 仅在真正触底（滚动 / 遥控器导航）时才预取下一页，避免接口返回后不停自动链式翻页

/* ---------- TMDB：高清海报 + 元数据 ---------- */
function cleanTitle(t) {
  t = String(t || "");
  t = t.replace(/[（(]\s*\d{4}\s*[)）]/g, " ");            // 去年份括号
  t = t.replace(/\b(19|20)\d{2}\b/g, " ");
  t = t.replace(/4K|2160P|1080P|蓝光原盘|蓝光|原盘|REMUX|HDR10?\+?|杜比视界|DV|WEB-?DL|WEB|内封|国语|中字|高清|超清|合集/gi, " ");
  t = t.replace(/[\-—_|].*$/, "");                         // 去副标题分隔后缀（· 是人名间隔号，不能切）
  return t.replace(/\s+/g, " ").trim();
}
// 专用于海报检索：遇到"第X季"、空格或括号，只取前面的部分，避免"xxx 第2季"这类查询搜不到海报
function posterQueryTitle(t) {
  var name = cleanTitle(t);
  // 合集列举命名，如"误杀1 误杀2 误杀3"：提取重复出现的公共名字
  var seq = name.match(/^([\u4e00-\u9fffA-Za-z·]+?)\d+(?:[\s\/、,，]+\1\d+)+/);
  if (seq) return seq[1];
  name = name.replace(/\s*([:：])\s*/g, "$1"); // 冒号前后的空格去掉，避免把"斯巴达克斯：死战"这类名字切断
  name = name.replace(/第[0-9一二三四五六七八九十百千]+[季部集期].*$/, "");
  var m = name.match(/^[^\s（(]+/);
  return (m ? m[0] : name).trim();
}
// 冒号全/半角互换，用于两种都搜一遍
function colonAltName(name) {
  if (!name) return null;
  if (name.indexOf("：") >= 0) return name.replace(/：/g, ":");
  if (name.indexOf(":") >= 0) return name.replace(/:/g, "：");
  return null;
}
// 从标题解析"第X季"的季号（阿拉伯数字/中文数字都支持），解析不到返回0
function seasonNumberOf(t) {
  var m = String(t || "").match(/第\s*([0-9一二三四五六七八九十百]+)\s*季/);
  if (!m) return 0;
  var s = m[1];
  if (/^[0-9]+$/.test(s)) return parseInt(s, 10);
  var map = { 零: 0, 一: 1, 二: 2, 两: 2, 三: 3, 四: 4, 五: 5, 六: 6, 七: 7, 八: 8, 九: 9, 十: 10 };
  if (s.indexOf("十") >= 0) {
    var parts = s.split("十");
    var tens = parts[0] === "" ? 1 : (map[parts[0]] || 1);
    var ones = parts[1] === "" ? 0 : (map[parts[1]] || 0);
    return tens * 10 + ones;
  }
  return map[s] || 0;
}
// 搜索名整体就是"纯名字+末尾1-2位数字"，没写"季"字，如"爱情公寓2"：数字当季号候选
function trailingSeasonDigit(name) {
  var m = String(name || "").match(/^[\u4e00-\u9fffA-Za-z·]{2,}?([1-9][0-9]?)$/);
  return m ? parseInt(m[1], 10) : 0;
}
function yearOf(t) { var m = String(t || "").match(/(19|20)\d{2}/); return m ? m[0] : ""; }
function tmdbApi(path, params) {
  var q = "api_key=" + encodeURIComponent(config.tmdbKey) + "&language=zh-CN";
  if (params) for (var k in params) if (Object.prototype.hasOwnProperty.call(params, k)) q += "&" + k + "=" + encodeURIComponent(params[k]);
  return "https://api.tmdb.org/3" + path + "?" + q;
}
function loadTmdb(item) {
  if (!config.tmdbKey) return;
  var token = state.panToken;
  var name = posterQueryTitle(item.title);
  var yr = yearOf(item.title);
  var seasonNum = seasonNumberOf(item.title) || trailingSeasonDigit(name);
  var wantTv = state.activeCat === "zuixin-juji" || /第.?季|剧集|全集|季/.test(item.title || "") || /集/.test(item.meta || "");
  function trySearch(q) {
    return httpJson(tmdbApi("/search/multi", { query: q, include_adult: "false" })).then(function (data) {
      if (token !== state.panToken) return true;
      var list = (data && data.results ? data.results : []).filter(function (r) { return r.media_type === "movie" || r.media_type === "tv"; });
      if (!list.length) return false;
      list.sort(function (a, b) { return score(b) - score(a); });
      function score(r) {
        var s = 0;

  state.homeReturn = { key: a && a.getAttribute ? a.getAttribute("data-card-index") : null, scrollY: window.pageYOffset || 0 };
}
function restoreHomeReturn() {
  if (state.focusScope !== "home") return;
  var hr = state.homeReturn; if (!hr) return;
  window.scrollTo(0, hr.scrollY);
  if (state.isTv && hr.key != null) { var card = $("grid").querySelector("[data-card-index='" + hr.key + "']"); if (card) focusRemoteTarget(card); }
}

/* ---------- 工具 ---------- */
function el(tag, cls, text) { var e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; }
function trimSlash(s) { return (s || "").replace(/\/+$/, ""); }
function escapeHtml(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
/* 播放页图片预热：详情页拿到海报/横屏剧照后立即提交给原生 Glide 预热，
   用户点播放/继续观看时不用等首帧加载。不阻塞、不等待、失败静默。 */
function preloadArtwork(pic) {
  if (!(window.fm && fm.preloadArtwork)) return;
  pic = pic || "";
  if (!pic) return;
  try { fm.preloadArtwork(pic, "").then(function () {}, function () {}); } catch (e) {}
}
function hashKey(s) { s = String(s || ""); var h = 5381, i = s.length; while (i) { h = (h * 33) ^ s.charCodeAt(--i); } return (h >>> 0).toString(16); }

/* ---------- 事件 ---------- */
function bindEvents() {
  $("searchGo").onclick = function () { startSearch($("search").value); };
  $("search").addEventListener("keydown", function (e) {
    var key = e.key || (e.keyCode === 13 ? "Enter" : e.keyCode === 38 ? "ArrowUp" : e.keyCode === 40 ? "ArrowDown" : e.keyCode === 27 ? "Escape" : "");
    if (this.hasAttribute("readonly")) return;
    if (key === "ArrowDown") { e.preventDefault(); moveSuggest(1); return; }
    if (key === "ArrowUp") { e.preventDefault(); moveSuggest(-1); return; }
    if (key === "Escape") { hideSuggest(); return; }
    if (key === "Enter") {
      if (state.suggestIndex >= 0 && state.suggestItems[state.suggestIndex]) selectSuggest(state.suggestItems[state.suggestIndex]);
      else startSearch(this.value);
    }
  });
  $("search").addEventListener("input", function () {
    var kw = this.value.trim();
    if (suggestTimer) { clearTimeout(suggestTimer); suggestTimer = null; }
    if (!kw) { hideSuggest(); return; }
    suggestTimer = setTimeout(function () { fetchSuggest(kw); }, 300);
  });
  $("search").addEventListener("blur", function () { setTimeout(function () { hideSuggest(); }, 150); });
  $("searchSuggest").addEventListener("mousedown", function (e) {
    var row = e.target && e.target.closest ? e.target.closest(".sg-item") : null;
    if (!row) return;
    e.preventDefault();
    var idx = parseInt(row.getAttribute("data-sg-index"), 10);
    if (state.suggestItems[idx]) selectSuggest(state.suggestItems[idx]);
  });
  $("clearSearch").onclick = clearSearch;
  $("openSettings").onclick = openSettings;
  $("edPlay").onclick = playBest;
  $("detailOverview").onclick = toggleOverview;
  $("edRefresh").onclick = function () { if (state.currentItem) { $("panList").replaceChildren(el("div", "pan-loading", "重新读取…")); state.panToken++; loadResources(state.currentItem); loadTmdb(state.currentItem); } };
  $("nativeSearch").onclick = function () { var d = state.currentDetail; if (d) openPanSearch(d.title || d.rawTitle); };
  $("appSearchBtn").onclick = function () {
    var d = state.currentDetail; if (!d) return;
    if (!(window.fm && fm.search)) { toast("请在 App 内使用原生搜索"); return; }
    var full = d.rawTitle || d.title || "";
    var shortName = posterQueryTitle(full);
    var opts = { direct: true, pic: d.poster };
    var tried = {}, queue = [];
    [shortName, colonAltName(shortName), full, colonAltName(full)].forEach(function (n) {
      if (n && !tried[n]) { tried[n] = true; queue.push(n); }
    });
    (function next(i) {
      if (i >= queue.length) return;
      fm.search(queue[i], opts).then(function () {}, function () { next(i + 1); });
    })(0);
  };
  $("cfgSave").onclick = saveConfig;
  $("cfgClose").onclick = closeSettings;
  $("cfgCloseX").onclick = closeSettings;
  $("cfgFull").onclick = function () { setSwitch(this, this.getAttribute("data-on") !== "1"); };
  $("settingsOverlay").addEventListener("click", function (e) { if (e.target === this) closeSettings(); });
  document.addEventListener("keydown", onKeydown, true);
  window.addEventListener("fmviewport", function (e) { gridColsCache.key = ""; applyChromeMode(e && e.detail ? e.detail.chromeMode : ""); });
  window.addEventListener("resize", function () { gridColsCache.key = ""; });
  window.addEventListener("fmresume", function () { loadRecent(); checkStuckLoading(); });
  document.addEventListener("visibilitychange", function () { if (!document.hidden) checkStuckLoading(); });
  setInterval(checkStuckLoading, 8000);
  // 左右滑动切换分类（仅主页；忽略横向滚动条区域）
  var tsx = 0, tsy = 0, tmoved = false, ttrack = false;
  function onTS(e) {
    if (state.focusScope !== "home") { ttrack = false; return; }
    var t = e.touches && e.touches[0]; if (!t) return;
    if (e.target && e.target.closest && e.target.closest(".chips, .genre-chips, .rail, input")) { ttrack = false; return; }
    tsx = t.clientX; tsy = t.clientY; tmoved = false; ttrack = true;
  }
  function onTM(e) {
    if (!ttrack) return;
    var t = e.touches && e.touches[0]; if (!t) return;
    if (Math.abs(t.clientX - tsx) > 8 || Math.abs(t.clientY - tsy) > 8) tmoved = true;
  }
  function onTE(e) {
    if (!ttrack || !tmoved) { ttrack = false; return; }
    var t = e.changedTouches && e.changedTouches[0]; if (!t) { ttrack = false; return; }
    var dx = t.clientX - tsx, dy = t.clientY - tsy;
    ttrack = false;
    if (Math.abs(dx) > 64 && Math.abs(dx) > Math.abs(dy) * 1.6) swipeCategory(dx < 0 ? 1 : -1);
  }
  document.addEventListener("touchstart", onTS, { passive: true });
  document.addEventListener("touchmove", onTM, { passive: true });
  document.addEventListener("touchend", onTE, { passive: true });
  // 触底加载
  window.addEventListener("scroll", function () {
    if (state.focusScope !== "home") return;
    var sc = window.pageYOffset || 0, vh = window.innerHeight || 800, dh = document.body.scrollHeight || 0;
    if (sc + vh > dh - 400) appendGrid(true);
  }, { passive: true });
}

/* ---------- 启动 ---------- */
function boot() {
  detectDevice();
  renderChips();
  renderGenreChips();
  bindEvents();
  wireInputs();
  whenSdk().then(function (ready) {
    state.sdkReady = ready;
    if (ready) root.classList.add("fm-native");
    return loadConfig().then(function () {
      if (ready) {
        detectDevice();
        applyChromeMode(config.homeFull ? "edge" : "normal");
        if (fm.ui && fm.ui.setChrome) fm.ui.setChrome({ mode: config.homeFull ? "edge" : "normal", statusBarStyle: "light", navigationBarStyle: "light", startup: true }).then(function () {}, function () {});
        if (fm.ui && fm.ui.getViewport) fm.ui.getViewport().then(function (vp) { applyChromeMode(vp && vp.chromeMode); }, function () {});
        if (fm.config) fm.config().then(function (c) { state.driveCheck = c && c.driveCheck !== false; }, function () {});
      }
      wireInputs();
    });
  }).then(function () {
    loadRecent();
    loadList(true);
    if (state.isTv) { var chip = $("chips").querySelector(".focusable"); if (chip) focusRemoteTarget(chip); }
  });
}
if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
else boot();
</script>
